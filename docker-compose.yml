services:
  db:
    image: mysql:8
    container_name: forca-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: forca
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - forca-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: forca-frontend
    ports:
      - "8080:80"
    networks:
      - forca-network
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forca-backend
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: forca
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    networks:
      - forca-network
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:latest
    container_name: forca-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - forca-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: forca-grafana
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - forca-network
    depends_on:
      - prometheus

volumes:
  db_data:

networks:
  forca-network:
    driver: bridge

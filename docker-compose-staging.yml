version: '3.8'

services:
  db:
    image: mysql:8
    container_name: forca-db-staging
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: forca
    ports:
      - "3308:3306"
    volumes:
      - db_data_staging:/var/lib/mysql
    networks:
      - forca-staging-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: forca-frontend-staging
    ports:
      - "8081:80"
    networks:
      - forca-staging-network
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forca-backend-staging
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: forca
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3001:3000"
    volumes:
      - .:/app
    networks:
      - forca-staging-network
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:latest
    container_name: forca-prometheus-staging
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - forca-staging-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: forca-grafana-staging
    ports:
      - "3006:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - forca-staging-network
    depends_on:
      - prometheus

volumes:
  db_data_staging:

networks:
  forca-staging-network:
